[project]
name = "canopy-runner"
version = "0.1.0"
description = "Canopy laptop/cloud runner: claims turns from canopy-web and executes them (emdash adapter first)."
requires-python = ">=3.11"
dependencies = [
    # The cron slot math the runner fires on. Lives in-repo at packages/canopy_cron
    # and is shared verbatim with the server (which previews fire times from the
    # same next_slots) — the runner is Django-free and cannot import apps.*, so a
    # shared package is the only way the editor's preview and the runner's firing
    # can't drift. croniter's bound is declared there, once; don't restate it here.
    "canopy-cron",
]

[project.optional-dependencies]
# The runner's core loop is stdlib-only over HTTP and never needs this. The
# `realtime` extra turns on the WebSocket wake listener (wake.py): the runner
# holds a live control channel to canopy-web and claims on push instead of only
# on the 5s poll tick. `wake.py` imports `websocket` LAZILY and falls back to
# poll-only when it's absent, so this stays an OPT-IN capability, not a hard
# requirement — but it's installed by default in the one-time setup (see README)
# so a normally-provisioned runner gets instant wakes rather than silently
# regressing to polling because nothing ever declared the dep.
realtime = ["websocket-client>=1.8,<2"]

[tool.uv.sources]
# In-repo, standalone, installable — same editable path-dep wiring the root
# pyproject uses for canopy-agent-runs / canopy-cron, resolved relative to this
# package so `uv run` here works without publishing to an index.
canopy-cron = { path = "../canopy_cron", editable = true }

[project.scripts]
canopy-runner = "canopy_runner.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
# The runner's tests run with PLAIN pytest — no pytest-django, no DB (the package is
# stdlib-only). Without this block pytest walks up to the repo-root pyproject and
# applies its DJANGO_SETTINGS_MODULE, which fails to import here. Same convention as
# packages/canopy_agent_runs; the root suite skips this dir via `addopts = --ignore=packages`.
pythonpath = ["."]
testpaths = ["tests"]
python_files = ["test_*.py"]
