[project]
name = "canopy-cron"
version = "0.1.0"
description = "Django-free cron slot math for scheduled agent turns: validation, due-slot lookup, and fire-time preview. Shared by canopy-web's server and the laptop runner."
readme = "README.md"
requires-python = ">=3.11"
# croniter's bound is deliberate and load-bearing: a major bump changing
# get_prev()/DST semantics means "the schedule silently never fires" — the exact
# failure the scheduled-turns design exists to prevent. Pin it here, once, where
# the slot math lives; consumers inherit the bound rather than restating it.
dependencies = [
    "croniter>=6.0,<7.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["canopy_cron"]

[tool.pytest.ini_options]
# The package's own tests run with PLAIN pytest — no pytest-django, no DB.
# `canopy_cron` itself resolves via the editable install.
pythonpath = ["."]
testpaths = ["tests"]
python_files = ["test_*.py"]
