# Example runtime.yaml — an agent's declarative runtime spec.
#
# This file lives in the AGENT's repo (e.g. echo/, ada/), versioned + reviewed in
# the agent's own PRs like a package.json or Dockerfile. It declares what the agent
# needs to run in ANY environment — a laptop with emdash, a cloud runner with
# `claude -p`, a fresh box. The reconciler reads it, scans the box, applies only
# the gaps, and runs the preflight before starting the turn.
#
# It NEVER contains a secret value. `secrets` lists reference NAMES; the actual
# values live in the env's store (1Password on a laptop, AWS Secrets Manager in
# the cloud) and are resolved from the name by the reconciler.

version: 1

# Preferred execution engine: emdash (laptop, interactive) | cloud_p (headless
# `claude -p`) | any. The reconciler brings the box to readiness for whichever
# engine the run selects; "any" lets the runner pick.
engine: any

# The .claude-plugins this agent depends on. Every canopy agent needs `canopy`;
# ACE-family agents also need `ace`; each agent ships its own plugin.
plugins:
  - name: canopy
    source: https://github.com/dimagi/canopy-plugin
  - name: ace
    source: https://github.com/dimagi/ace-plugin
  - name: echo            # the agent's own plugin (source omitted → this repo)

# MCP servers the runtime must have wired up (usually provided by the plugins above).
mcp:
  - name: canopy-web       # per-user PAT-authed; the plugin wires the endpoint

# CLI tools that must be on PATH.
tools:
  - name: claude
  - name: gh

# Secret REFERENCE NAMES only — resolved from the env's store, never stored here.
secrets:
  - canopy-pat             # the PAT the runner pairs + posts turns with
  - echo-gog               # this agent's Google OAuth (gog login)

# Checks that define "ready". Each `run` is a non-secret probe; `expect` is an
# optional substring to find in its output. A check the box can't self-heal
# (interactive OAuth) surfaces as "needs bootstrap" instead of a half-provisioned run.
preflight:
  - name: claude-authed
    run: claude whoami
    expect: "@"
  - name: canopy-reachable
    run: canopy doctor
    expect: ok
