[project]
name = "canopy-runtime"
version = "0.1.0"
description = "Django-free schema for an agent's declarative runtime spec (runtime.yaml): the plugins, MCP servers, tools, engine, secret REFERENCES, and preflight that define 'ready to run this agent'. Lives in the agent's repo; read + validated by the reconciler."
readme = "README.md"
requires-python = ">=3.11"
# pydantic for validation; pyyaml so a runner can load runtime.yaml straight
# from the agent's repo. Deliberately NOT depending on Django — the reconciler
# imports this on a bare cloud box that never installs canopy-web.
dependencies = [
    "pydantic>=2.6,<3.0",
    "pyyaml>=6.0,<7.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["canopy_runtime"]

[tool.pytest.ini_options]
# Plain pytest — no pytest-django, no DB. The package resolves via editable install.
pythonpath = ["."]
testpaths = ["tests"]
python_files = ["test_*.py"]
