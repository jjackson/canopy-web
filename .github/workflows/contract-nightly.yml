name: Contract tests (nightly, exhaustive)

# The per-PR contract job (ci.yml) runs a fast smoke (SCHEMATHESIS_MAX_EXAMPLES
# defaults to a few per endpoint) so it isn't a ~6-min blocker on every PR. This
# job runs the EXHAUSTIVE property-based fuzz nightly + on demand, off the PR
# critical path.

on:
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC daily
  workflow_dispatch:
    inputs:
      max_examples:
        description: "Schemathesis examples per endpoint"
        required: false
        default: "100"

jobs:
  contract-tests-nightly:
    name: Contract tests (Schemathesis, exhaustive)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: canopy_web
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Apply migrations
        run: uv run python manage.py migrate
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/canopy_web
          DJANGO_SETTINGS_MODULE: config.settings.production
          SECRET_KEY: ci-secret
          ALLOWED_HOSTS: localhost,127.0.0.1
          AUTH_ALLOWED_EMAIL_DOMAIN: dimagi-ai.com
          REQUIRE_AUTH: "False"

      - name: Mint PAT for schemathesis
        id: pat
        run: |
          RAW=$(uv run python manage.py create_token \
            --email ace@dimagi-ai.com --label schemathesis-ci --create-user \
            | tail -1)
          echo "::add-mask::$RAW"
          echo "raw=$RAW" >> $GITHUB_OUTPUT
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/canopy_web
          DJANGO_SETTINGS_MODULE: config.settings.production
          SECRET_KEY: ci-secret
          ALLOWED_HOSTS: localhost,127.0.0.1
          AUTH_ALLOWED_EMAIL_DOMAIN: dimagi-ai.com

      - name: Start backend
        run: |
          uv run python manage.py runserver 0.0.0.0:8000 > /tmp/runserver.log 2>&1 &
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:8000/api/openapi.json > /dev/null; then
              echo "backend up"
              break
            fi
            sleep 1
          done
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/canopy_web
          DJANGO_SETTINGS_MODULE: config.settings.production
          SECRET_KEY: ci-secret
          ALLOWED_HOSTS: localhost,127.0.0.1
          AUTH_ALLOWED_EMAIL_DOMAIN: dimagi-ai.com
          REQUIRE_AUTH: "True"

      - name: Run schemathesis (exhaustive)
        run: uv run pytest tests/contract/ -v
        env:
          SCHEMATHESIS_SCHEMA_URL: http://localhost:8000/api/openapi.json
          SCHEMATHESIS_AUTH_BEARER: ${{ steps.pat.outputs.raw }}
          SCHEMATHESIS_MAX_EXAMPLES: ${{ github.event.inputs.max_examples || '100' }}
