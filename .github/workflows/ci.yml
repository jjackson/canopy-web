name: CI

# Runs backend tests + frontend build on every PR and push to main.
# Deployment is manual, from a developer machine: `./deploy-labs.sh` on main
# (builds locally → pushes to ECR → rolls the ECS service on connect-labs).
# See CLAUDE.md. There is no CI deploy job — wiring AWS OIDC for GitHub Actions
# is a future enhancement. (The GCP Cloud Run deploy job was retired when
# canopy-web migrated off GCP on 2026-06-30.)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test-backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Run pytest
        run: uv run pytest

  test-frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
