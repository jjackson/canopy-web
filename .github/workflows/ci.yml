name: CI

# Runs backend tests + frontend build on every PR and push to main.
# Deploys are a separate, manual workflow: .github/workflows/deploy-labs.yml
# (GitHub → AWS labs / ECS Fargate).

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test-backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --extra dev

      # Fast, zero-DB gates before the (longer) test run — they reuse the uv env
      # already synced above, so they add ~seconds, not a new job spin-up.

      # Catch real bugs: unused imports (F401) and undefined names (F821/F811).
      # Scoped to pyflakes (`--select F`), not the full ruff ruleset — the repo
      # isn't style-clean yet, and this gate is about correctness, not formatting.
      # F403/F405 are ignored: the settings modules use `from base import *` by design.
      - name: Lint (ruff — pyflakes only)
        run: uv run ruff check . --select F --ignore F403,F405

      # A model change without its migration is a class of bug this fast-moving repo
      # hits often; catch it before it reaches a deploy. Test settings = SQLite, no
      # DB server needed.
      - name: Check migrations are in sync
        run: uv run python manage.py makemigrations --check --dry-run
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test

      - name: Django system checks
        run: uv run python manage.py check
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test

      - name: Run pytest
        run: uv run pytest

      # The root suite sets --ignore=packages, so each standalone in-repo package
      # needs its own invocation from its own dir — otherwise its tests never run
      # on a PR. Running from the package dir (rather than --project ../..) also
      # resolves each package's OWN declared deps, so the dependency wiring is
      # exercised rather than masked by the root env.
      #
      # canopy_cron holds the cron/DST slot math that the server's preview and the
      # runner's firing SHARE — one implementation precisely so the UI can't say
      # "Fridays" while the runner fires Thursdays. Its DST cases are the reason
      # the extraction exists; they must actually execute somewhere.
      - name: Run canopy_cron tests
        working-directory: packages/canopy_cron
        run: uv run --with pytest pytest -q

      # The runner decides WHICH slot is due and fires it, so its suite is the only
      # thing standing between a scheduling bug and a fleet that silently never
      # fires (or fires a slot predating its schedule). Also covers the
      # session-reuse regressions.
      - name: Run canopy_runner tests
        working-directory: packages/canopy_runner
        run: uv run --with pytest pytest

      # canopy_agent_runs is the Django-free run-lifecycle core that apps/agent_runs
      # imports directly (schemas, stores, the Drive client) — not dead code — yet its
      # suite had never run in CI. `--extra drive` is required, not optional polish:
      # the Drive google_client tests import googleapiclient, which lives in the
      # package's optional `drive` group. Without it 10 tests fail on ImportError.
      - name: Run canopy_agent_runs tests
        working-directory: packages/canopy_agent_runs
        run: uv run --extra drive --with pytest pytest

      # canopy_runtime defines + validates the agent runtime.yaml schema (the
      # Agent Runtime Registry). The reconciler (RS2) loads it on a bare cloud box,
      # so it's Django-free and installable; its guardrails — extra="forbid" and
      # "secrets are reference names, never values" — must actually execute.
      - name: Run canopy_runtime tests
        working-directory: packages/canopy_runtime
        run: uv run --with pytest pytest -q

  test-frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Run vitest
        working-directory: frontend
        run: npm run test
