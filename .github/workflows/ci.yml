name: CI / Deploy

# Runs backend tests + frontend build on every PR and push to main.
# Deploy is manual-only: trigger via the "Run workflow" button on the
# Actions tab (workflow_dispatch). When triggered, the deploy job waits
# for both test jobs to pass before shipping images to Cloud Run.
#
# One-time GCP setup required for the deploy job to authenticate via
# Workload Identity Federation (no long-lived service account keys):
#
#   gcloud iam service-accounts create canopy-web-deployer \
#     --project=canopy-494811
#
#   gcloud iam workload-identity-pools create github \
#     --project=canopy-494811 --location=global \
#     --display-name="GitHub Actions"
#
#   gcloud iam workload-identity-pools providers create-oidc github \
#     --project=canopy-494811 --location=global \
#     --workload-identity-pool=github \
#     --display-name="GitHub" \
#     --attribute-mapping="google.subject=assertion.sub,attribute.repository=assertion.repository,attribute.repository_owner=assertion.repository_owner" \
#     --attribute-condition="assertion.repository_owner=='jjackson'" \
#     --issuer-uri="https://token.actions.githubusercontent.com"
#
#   gcloud iam service-accounts add-iam-policy-binding \
#     canopy-web-deployer@canopy-494811.iam.gserviceaccount.com \
#     --project=canopy-494811 \
#     --role=roles/iam.workloadIdentityUser \
#     --member="principalSet://iam.googleapis.com/projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/github/attribute.repository/jjackson/canopy-web"
#
# Then grant the deployer SA the roles it needs (run, artifact registry,
# cloud sql, secret manager accessor) and add these GitHub repo secrets:
#
#   GCP_WIF_PROVIDER  →  projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/github/providers/github
#   GCP_SERVICE_ACCOUNT  →  canopy-web-deployer@canopy-494811.iam.gserviceaccount.com

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test-backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Run pytest
        run: uv run pytest

  test-frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

  contract-tests:
    name: Contract tests (Schemathesis)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: canopy_web
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Apply migrations
        run: uv run python manage.py migrate
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/canopy_web
          DJANGO_SETTINGS_MODULE: config.settings.production
          SECRET_KEY: ci-secret
          ALLOWED_HOSTS: localhost,127.0.0.1
          AUTH_ALLOWED_EMAIL_DOMAIN: dimagi-ai.com
          REQUIRE_AUTH: "False"

      - name: Mint PAT for schemathesis
        id: pat
        run: |
          RAW=$(uv run python manage.py create_token \
            --email ace@dimagi-ai.com --label schemathesis-ci --create-user \
            | tail -1)
          echo "::add-mask::$RAW"
          echo "raw=$RAW" >> $GITHUB_OUTPUT
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/canopy_web
          DJANGO_SETTINGS_MODULE: config.settings.production
          SECRET_KEY: ci-secret
          ALLOWED_HOSTS: localhost,127.0.0.1
          AUTH_ALLOWED_EMAIL_DOMAIN: dimagi-ai.com

      - name: Start backend
        run: |
          uv run python manage.py runserver 0.0.0.0:8000 > /tmp/runserver.log 2>&1 &
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:8000/api/openapi.json > /dev/null; then
              echo "backend up"
              break
            fi
            sleep 1
          done
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/canopy_web
          DJANGO_SETTINGS_MODULE: config.settings.production
          SECRET_KEY: ci-secret
          ALLOWED_HOSTS: localhost,127.0.0.1
          AUTH_ALLOWED_EMAIL_DOMAIN: dimagi-ai.com
          REQUIRE_AUTH: "True"

      - name: Run schemathesis
        run: uv run pytest tests/contract/ -v
        env:
          SCHEMATHESIS_SCHEMA_URL: http://localhost:8000/api/openapi.json
          SCHEMATHESIS_AUTH_BEARER: ${{ steps.pat.outputs.raw }}

  deploy:
    name: Deploy to Cloud Run
    needs: [test-backend, test-frontend]
    # Manual-only: must be triggered from the Actions tab via "Run workflow".
    # Tests still gate the deploy because of `needs:` above. The first step
    # also hard-fails unless the dispatched ref is `main` — production ships
    # from main only, never from a feature branch.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation
    steps:
      - name: Guard — deploy from main only
        run: |
          if [ "${{ github.ref_name }}" != "main" ]; then
            echo "::error::Refusing to deploy from '${{ github.ref_name }}'. Production deploys must run from main — merge your branch, then dispatch the deploy from main."
            exit 1
          fi
          echo "Ref guard OK: deploying from main (${{ github.sha }})."

      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Deploy
        env:
          SKIP_TESTS: '1'  # Already verified in test-backend / test-frontend jobs
          # Read-only token for the private jjackson/canopy plugin; deploy.sh
          # clones it into the build context so /system renders the catalog.
          # Optional — when unset the build still succeeds (empty catalog).
          CANOPY_PLUGIN_TOKEN: ${{ secrets.CANOPY_PLUGIN_TOKEN }}
        run: ./deploy.sh ${{ github.sha }}

      # deploy.sh ships the service image but NOT migrations. Run the migrate
      # Cloud Run job against the exact image we just deployed, so a schema
      # change can never ship half-applied (the new code live with the old
      # schema → 500s on the new tables). Idempotent: no-op when there's nothing
      # to migrate.
      - name: Run database migrations
        run: |
          IMG="us-central1-docker.pkg.dev/canopy-494811/canopy-web/canopy-web:${{ github.sha }}"
          gcloud run jobs update canopy-web-migrate \
            --image="$IMG" --region=us-central1 --quiet
          gcloud run jobs execute canopy-web-migrate \
            --region=us-central1 --wait
