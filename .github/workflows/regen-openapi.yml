name: OpenAPI types check

# Frontend types (frontend/src/api/generated.ts) are generated from the backend's
# OpenAPI schema. This job VERIFIES they're up to date on any PR that touches the
# API surface — it regenerates and fails if the committed file is stale. It does
# NOT commit for you.
#
# Why verify instead of auto-commit: a bot commit pushed with the default
# GITHUB_TOKEN cannot trigger the required CI checks (GitHub's workflow-loop
# guard), so it left the PR head with no status checks and blocked the merge. A
# verify check has no bot commit, so the PR head stays the author's commit that CI
# runs on normally. Fix a failure locally with `cd frontend && npm run gen:api`.

on:
  pull_request:
    paths:
      - "apps/**/api.py"
      - "apps/**/schemas.py"
      - "apps/api/**"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Boot Django for schema dump
        run: |
          $HOME/.local/bin/uv sync --extra dev
          $HOME/.local/bin/uv run python -c "
          import django, json, os
          os.environ['DJANGO_SETTINGS_MODULE'] = 'config.settings.test'
          django.setup()
          from apps.api.api import api
          with open('frontend/openapi.json', 'w') as f:
              json.dump(api.get_openapi_schema(), f, indent=2)
          print('schema dumped')
          "
      - name: Regenerate types
        working-directory: frontend
        run: |
          npm install
          npx openapi-typescript openapi.json --output src/api/generated.ts --immutable
      - name: Fail if types are stale
        run: |
          if ! git diff --quiet frontend/src/api/generated.ts; then
            echo "::error::frontend/src/api/generated.ts is out of date with the OpenAPI schema."
            echo "You changed an API schema/route but didn't regenerate the frontend types."
            echo "Fix it locally and commit the result:"
            echo "    cd frontend && npm run gen:api        # with the backend running on :8000"
            echo "    # or, against a dumped schema:  npm run gen:api:local"
            echo "--- diff ---"
            git --no-pager diff frontend/src/api/generated.ts
            exit 1
          fi
          echo "generated.ts is up to date."
