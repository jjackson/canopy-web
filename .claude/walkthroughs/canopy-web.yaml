name: Canopy Web - Skill Builder from Conversations
url: http://localhost:9101
description: |
  Collaborative web workspace for building reusable AI skills from conversations.
  Users paste conversation content, the AI analyzes and proposes a skill with eval cases,
  and users can edit, test, and publish the skill.

pages:
  - name: Discovery Feed
    path: /
    description: |
      Landing page showing published skills in a table (not cards).
      Empty state shows "No skills yet" with a CTA to create the first skill.
      Has search bar and "New" button in header.
    checks:
      - "Canopy" branding in header
      - Navigation links (Skills, Leaderboard)
      - Search input visible
      - "New" button visible
      - Empty state message when no skills exist

  - name: New Skill Page
    path: /new
    description: |
      Form page where users create a new skill from conversation content.
      Has collection name input, large textarea for pasting source content,
      and "Start Analysis" button.
    checks:
      - "New Skill from Source" heading
      - Collection name input with placeholder
      - Large textarea for pasting content
      - "Start Analysis" button
      - Clear instructions about what to paste

  - name: Leaderboard
    path: /leaderboard
    description: |
      Eval improvement leaderboard showing skills sorted by usage and eval scores.
      Empty state shows "No eval data yet" with guidance.
    checks:
      - "Leaderboard" heading
      - Empty state with helpful message when no data

  - name: Workspace
    path: /workspace/1
    description: |
      The core product screen. Shows step indicator at top,
      source panel on left (30%), approach + eval panel on right (70%).
      This is where users co-author skills with the AI.
    checks:
      - Step indicator bar visible
      - Source panel on left
      - Approach panel on right
      - Eval cases section
      - Publish and Run Eval buttons

flow:
  - step: Land on discovery page
    action: Navigate to /
    expect: See empty state with "No skills yet" and "Create Skill" CTA

  - step: Navigate to new skill
    action: Click "New" or "Create Skill" button
    expect: Navigate to /new page with form

  - step: Check leaderboard
    action: Click "Leaderboard" in nav
    expect: See empty leaderboard with helpful message

  - step: Navigate back to skills
    action: Click "Skills" in nav
    expect: Return to discovery page
