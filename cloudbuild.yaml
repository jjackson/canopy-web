steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REPO}/${_SERVICE}:${_TAG}'
      - '-t'
      - '${_REPO}/${_SERVICE}:latest'
      - '-f'
      - 'Dockerfile'
      - '.'
    id: 'build'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '${_REPO}/${_SERVICE}']
    waitFor: ['build']

substitutions:
  _TAG: latest
  _REPO: us-central1-docker.pkg.dev/${PROJECT_ID}/canopy-web
  _SERVICE: canopy-web

images:
  - '${_REPO}/${_SERVICE}'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
