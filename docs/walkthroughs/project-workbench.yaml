name: "Project Workbench"
narrative: "A shared project registry where Jonathan and his AI agents track 13+ projects, current context, and next steps — all in one place."
base_url: "https://canopy-web-frontend-hhhi4yut3q-uc.a.run.app"

personas:
  jonathan:
    name: "Jonathan Jackson"
    role: "Intrapreneurship lead, building the canopy ecosystem"
    color: "#fb923c"
    intro: "Jonathan runs 13+ active projects simultaneously and context-switches constantly between canopy, ace, and the Connect ecosystem. He needs a single surface that tells him 'what was I working on?' for each project — and the same data has to be readable by his CLI agents and open claws."

scenes:
  - persona: jonathan
    title: "Workbench homepage"
    show: "The Projects page showing all 13 projects as a tile grid with status, deploy badges, and current context"
    impressive_because: "Every active project is visible at a glance — name, deploy URL, and a one-line context preview. Status dots show health, private badges show visibility. No hunting through GitHub tabs."

  - persona: jonathan
    title: "Expanded project card"
    show: "Click the canopy-web project tile — it breaks out to full width with a 3-column layout (context, latest summary, details + skills)"
    impressive_because: "The full-width breakout gives project context room to breathe without leaving the page. Other tiles reflow above and below. Three columns answer the three things you ever want to know: what's happening, what shipped recently, and where do I click."

  - persona: jonathan
    title: "Skills section in expanded card"
    show: "Inside the expanded canopy-web tile, the Skills section is collapsible. For projects like ace it would show 19+ skills discovered from the repo."
    impressive_because: "Skills come from a script that scans the GitHub repo's skills/ directory, not from manual tagging. Each project can list its skills inline without polluting the collapsed view."

  - persona: jonathan
    title: "Inline context editing"
    show: "Hover over a context line in the expanded card — an edit pencil appears. Click it to swap to a textarea where you can update 'current work' or 'next step'."
    impressive_because: "Context is read-only by default (most updates come from agents) but corrections take 5 seconds. No always-visible textarea cluttering the UI."

  - persona: jonathan
    title: "Skills page (legacy)"
    show: "Navigate to /skills — the original skill discovery feed is still here, just moved out of the homepage."
    impressive_because: "The skill builder hasn't been deleted — it's a secondary section now. Projects took over the homepage because they're the higher-traffic surface, but skills are one click away."
